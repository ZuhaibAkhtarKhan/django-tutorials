<html>
  <body>
    {% if name %}
    <h1>Hello {{ name }}</h1>
    {% else %}
    <h1>Hello World</h1>
    {% endif %}
    {% if result %}
    <ul>
      {% for order in result %}
      <li>{{order.customer.first_name}} - {{order.id}}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% if product %}
    <h1>{{product.count}} - {{product.min_price}}</h1>
    {% endif %}
    
  </body>
</html>
